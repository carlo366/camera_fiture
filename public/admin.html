<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #111; color: #fff; padding: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h1 { font-size: 20px; }
    button { padding: 8px 16px; background: #e94560; border: none; border-radius: 6px; color: #fff; cursor: pointer; }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .card { background: #1a1a2e; border-radius: 10px; overflow: hidden; cursor: pointer; }
    .card video { width: 100%; height: 160px; object-fit: cover; background: #000; display: block; }
    .card .info { padding: 8px 12px; font-size: 13px; color: #ccc; }
    .card .info strong { color: #fff; }
    #fullview { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; flex-direction: column; z-index: 100; }
    #fullview video { max-width: 90vw; max-height: 80vh; border-radius: 8px; }
    #fullview button { margin-top: 16px; }
    #empty { color: #555; text-align: center; margin-top: 60px; }
  </style>
</head>
<body>
  <header>
    <h1>Dashboard Admin</h1>
    <button onclick="logout()">Logout</button>
  </header>
  <div id="grid"></div>
  <p id="empty">Belum ada user yang terhubung.</p>
  <div id="fullview">
    <video id="fullVideo" autoplay playsinline></video>
    <button onclick="closeFullView()">Tutup</button>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="admin.js"></script>
</body>
</html>
